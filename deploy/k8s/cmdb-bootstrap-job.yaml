apiVersion: batch/v1
kind: Job
metadata:
  name: cmdb-bootstrap
  labels:
    app.kubernetes.io/name: cmdb
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cmdb
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: cmdb-bootstrap
          # 按实际镜像地址/版本替换
          image: veops/cmdb-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            # 建议把 DB/Redis/ACL 连接参数和 BOOTSTRAP_ADMIN_* 放在 ConfigMap/Secret 中
            - configMapRef:
                name: cmdb-api-env
            - secretRef:
                name: cmdb-api-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              flask db upgrade
              flask cmdb-init-acl
              flask ensure-bootstrap-admin
              flask init-import-user-from-acl
              flask init-department
