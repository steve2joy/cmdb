apiVersion: v1
kind: Namespace
metadata:
  name: cmdb
---
apiVersion: v1
kind: Secret
metadata:
  name: cmdb-env-secret
  namespace: cmdb
type: Opaque
stringData:
  # 请按实际环境修改
  BOOTSTRAP_ADMIN_PASSWORD: "123456"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmdb-env
  namespace: cmdb
data:
  TZ: "Asia/Shanghai"
  SYSTEM_DEFAULT_LANGUAGE: "zh-CN"
  # PostgreSQL
  POSTGRES_USER: "cmdb"
  POSTGRES_PASSWORD: "cmdb"
  POSTGRES_DB: "cmdb"
  # API 连接（与 docker-compose 网络别名保持一致）
  DB_HOST: "postgres"
  DB_PORT: "5432"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
  namespace: cmdb
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cache-data
  namespace: cmdb
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmdb-db
  namespace: cmdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmdb-db
  template:
    metadata:
      labels:
        app: cmdb-db
    spec:
      containers:
        - name: postgres
          image: postgres:16.13
          envFrom:
            - configMapRef:
                name: cmdb-env
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: db-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: cmdb
spec:
  selector:
    app: cmdb-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmdb-cache
  namespace: cmdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmdb-cache
  template:
    metadata:
      labels:
        app: cmdb-cache
    spec:
      containers:
        - name: redis
          image: registry.cn-hangzhou.aliyuncs.com/veops/cmdb-cache:2.5
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: cmdb-env
                  key: TZ
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: cache-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: cache-data
          persistentVolumeClaim:
            claimName: cache-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: cmdb
spec:
  selector:
    app: cmdb-cache
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmdb-api
  namespace: cmdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmdb-api
  template:
    metadata:
      labels:
        app: cmdb-api
    spec:
      containers:
        - name: cmdb-api
          image: cmdb-api:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: cmdb-env
            - secretRef:
                name: cmdb-env-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              flask db upgrade
              gunicorn --workers=4 autoapp:app -b 0.0.0.0:5000 -D

              celery -A celery_worker.celery worker -E -Q one_cmdb_async --autoscale=4,1 --logfile=one_cmdb_async.log -D
              celery -A celery_worker.celery worker -E -Q acl_async --logfile=one_acl_async.log --autoscale=4,1 -D

              nohup flask cmdb-trigger > trigger.log 2>&1 &
              flask cmdb-init-cache
              flask cmdb-init-acl
              flask ensure-bootstrap-admin
              flask init-import-user-from-acl
              flask init-department
              nohup flask cmdb-patch -v 2.4.17 > patch.log 2>&1 &
              flask cmdb-counter > counter.log 2>&1
          ports:
            - containerPort: 5000
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "ps aux|grep -v grep|grep -v '1 root'|grep gunicorn"]
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cmdb-api
  namespace: cmdb
spec:
  selector:
    app: cmdb-api
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmdb-ui-nginx-template
  namespace: cmdb
data:
  nginx.cmdb.conf.example: |
    server {
      listen ${NGINX_PORT};
      access_log   /var/log/nginx/access.cmdb.log;
      error_log    /var/log/nginx/error.cmdb.log;

      add_header 'Access-Control-Allow-Origin' "$http_origin";
      add_header 'Access-Control-Allow-Credentials' 'true';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With';

      gzip on;
      gzip_comp_level 6;
      gzip_buffers 16 8k;
      gzip_http_version 1.1;
      gzip_min_length 256;
      gzip_types text/plain text/css text/js text/xml text/javascript application/javascript application/x-javascript application/json application/xml application/rss+xml image/svg+xml;

      client_max_body_size 100m;

      root  /etc/nginx/html;
      location / {
        root   /etc/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
      }
      location /api {
          proxy_pass http://${CMDB_API_HOST};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Scheme $scheme;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_redirect off;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
      }
      location ~* \.(css|js)$ {
          access_log off;
          add_header Pragma public;
          add_header Cache-Control "public, max-age=7776000";
          add_header X-Asset "yes";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmdb-ui
  namespace: cmdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmdb-ui
  template:
    metadata:
      labels:
        app: cmdb-ui
    spec:
      containers:
        - name: cmdb-ui
          image: registry.cn-hangzhou.aliyuncs.com/veops/cmdb-ui:2.5.5
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: cmdb-env
                  key: TZ
            - name: CMDB_API_HOST
              value: "cmdb-api:5000"
            - name: NGINX_PORT
              value: "80"
          command:
            - /bin/sh
            - -c
            - |
              envsubst '$CMDB_API_HOST $NGINX_PORT' < /etc/nginx/conf.d/nginx.cmdb.conf.example > /etc/nginx/conf.d/cmdb.conf
              nginx -g 'daemon off;'
          volumeMounts:
            - name: nginx-template
              mountPath: /etc/nginx/conf.d/nginx.cmdb.conf.example
              subPath: nginx.cmdb.conf.example
          ports:
            - containerPort: 80
      volumes:
        - name: nginx-template
          configMap:
            name: cmdb-ui-nginx-template
---
apiVersion: v1
kind: Service
metadata:
  name: cmdb-ui
  namespace: cmdb
spec:
  type: NodePort
  selector:
    app: cmdb-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
